<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 650" width="1050" height="650">
  <defs>
    <linearGradient id="bgf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0b0d"/>
      <stop offset="100%" stop-color="#010102"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1050" height="650" fill="url(#bgf)"/>

  <!-- Subtle corner accent lines (techy detail) -->
  <line x1="60" y1="60" x2="120" y2="60" stroke="#22c55e" stroke-width="1.5" opacity="0.4"/>
  <line x1="60" y1="60" x2="60" y2="120" stroke="#22c55e" stroke-width="1.5" opacity="0.4"/>
  <line x1="990" y1="590" x2="930" y2="590" stroke="#22c55e" stroke-width="1.5" opacity="0.4"/>
  <line x1="990" y1="590" x2="990" y2="530" stroke="#22c55e" stroke-width="1.5" opacity="0.4"/>

  <!-- WeCompound logo — centered -->
  <text x="525" y="310" font-family="'Outfit', 'Segoe UI', sans-serif" font-weight="700" font-size="72" text-anchor="middle" letter-spacing="-1">
    <tspan fill="#f7f8f8">We</tspan><tspan fill="#22c55e">Compound</tspan>
  </text>

  <!-- Tagline -->
  <text x="525" y="370" font-family="'Work Sans', 'Segoe UI', sans-serif" font-weight="300" font-size="18" fill="#8a8f98" text-anchor="middle" letter-spacing="4">GROWTH AGENCY</text>
</svg>
