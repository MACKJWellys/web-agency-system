<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0b0d"/>
      <stop offset="100%" stop-color="#010102"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect x="2" y="2" width="508" height="508" rx="78" fill="none" stroke="#22c55e" stroke-width="3" opacity="0.2"/>
  <!-- "WeCompound" on one line, matching navbar style -->
  <text x="256" y="255" font-family="'Outfit', 'Segoe UI', sans-serif" font-weight="700" font-size="62" text-anchor="middle" letter-spacing="-1">
    <tspan fill="#f7f8f8">We</tspan><tspan fill="#22c55e">Compound</tspan>
  </text>
  <!-- Subheading -->
  <text x="256" y="305" font-family="'Outfit', 'Segoe UI', sans-serif" font-weight="400" font-size="24" fill="#8a8f98" text-anchor="middle" letter-spacing="3">LEAD RESPONSE TEAM</text>
</svg>
